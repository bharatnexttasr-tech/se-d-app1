<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="#1c1c1e"/>

  <!-- Calculator body -->
  <rect x="80" y="70" width="352" height="372" rx="28" fill="#2c2c2e"/>

  <!-- Display screen -->
  <rect x="104" y="94" width="304" height="110" rx="14" fill="#1a1a1c"/>
  <!-- Display number -->
  <text x="388" y="175" font-family="monospace" font-size="56" font-weight="400" fill="white" text-anchor="end">0</text>

  <!-- Button rows: 4x4 grid -->
  <!-- Row 1: AC  +/-  %  ÷ -->
  <rect x="104" y="224" width="66" height="46" rx="23" fill="#636366"/>
  <rect x="182" y="224" width="66" height="46" rx="23" fill="#636366"/>
  <rect x="260" y="224" width="66" height="46" rx="23" fill="#636366"/>
  <rect x="338" y="224" width="66" height="46" rx="23" fill="#ff9f0a"/>

  <!-- Row 2: 7  8  9  × -->
  <rect x="104" y="282" width="66" height="46" rx="23" fill="#3a3a3c"/>
  <rect x="182" y="282" width="66" height="46" rx="23" fill="#3a3a3c"/>
  <rect x="260" y="282" width="66" height="46" rx="23" fill="#3a3a3c"/>
  <rect x="338" y="282" width="66" height="46" rx="23" fill="#ff9f0a"/>

  <!-- Row 3: 4  5  6  − -->
  <rect x="104" y="340" width="66" height="46" rx="23" fill="#3a3a3c"/>
  <rect x="182" y="340" width="66" height="46" rx="23" fill="#3a3a3c"/>
  <rect x="260" y="340" width="66" height="46" rx="23" fill="#3a3a3c"/>
  <rect x="338" y="340" width="66" height="46" rx="23" fill="#ff9f0a"/>

  <!-- Row 4: 1  2  3  + -->
  <rect x="104" y="398" width="66" height="46" rx="23" fill="#3a3a3c"/>
  <rect x="182" y="398" width="66" height="46" rx="23" fill="#3a3a3c"/>
  <rect x="260" y="398" width="66" height="46" rx="23" fill="#3a3a3c"/>
  <rect x="338" y="398" width="66" height="46" rx="23" fill="#ff9f0a"/>
</svg>
